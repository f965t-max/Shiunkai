<p id="shiunkai21">
    『志雲会』は1968年に設立された少数精鋭型の公認会計士受験団体(サークル)です。<br>
    創立以来多数の公認会計士試験合格者を輩出し、OBOGは様々なフィールドで活躍しています。<br>
    近年の合格実績は、中央大学内の公認会計士受験団体ではトップクラスです。<br>
    また、本会では、横のつながりだけでなく縦のつながりを重視しており、監査・会計の分野で活躍されているOBOGとも繋がることができます。
</p>
